<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STRING | Writer's Suite 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;1,700&family=EB+Garamond:ital,wght@0,400;1,500&family=Space+Mono&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="icon" type="image/jpeg" href="icon.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Inter..." rel="stylesheet">
    <style>
        :root { --panel: #0a0a0a; --glass: rgba(255, 255, 255, 0.2); --neon: #00f2ff; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #000; color: white; overflow: hidden; font-family: 'Inter', sans-serif; }

        /* CINEMATIC WELCOME GATE */
        #welcome-gate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5000; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            padding-top: 12vh;
            transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1), 
                        filter 1.2s ease, 
                        opacity 1s ease;
            background: #000;
        }
        
        /* The Transition State */
        #welcome-gate.exit {
            transform: scale(1.5);
            filter: blur(20px) brightness(2);
            opacity: 0;
            pointer-events: none;
        }

        .welcome-slider { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .slide { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 2.5s; filter: brightness(0.4); }
        .slide.active { opacity: 1; }

        #welcome-gate h1 { 
            font-family: 'Space Mono'; font-weight: 600; font-size: 5rem; 
            letter-spacing: 25px; margin: 0; text-shadow: 0 0 30px var(--neon);
            animation: flicker 4s infinite;
        }

        #welcome-gate p { 
            font-size: 0.7rem; letter-spacing: 5px; color: var(--neon); 
            text-transform: uppercase; margin: 10px 0 30px 0; opacity: 0.8;
        }

        .enter-btn { 
            background: transparent; border: 1px solid var(--neon); color: var(--neon); 
            padding: 12px 30px; border-radius: 2px; cursor: pointer; 
            letter-spacing: 3px; font-size: 0.7rem; font-family: 'Space Mono';
            transition: all 0.3s; backdrop-filter: blur(5px);
            width: 160px;
        }
        .enter-btn:hover { background: var(--neon); color: black; box-shadow: 0 0 30px var(--neon); }

        @keyframes flicker { 0%, 100% { opacity: 1; } 98% { opacity: 0.3; } }

        /* MAIN APP STAGE */
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        #bg-image { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.45); position: absolute; z-index: 0; transition: filter 1.5s ease; }
        #bg-video { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: -1; display: none; }
        
        #string-container {
            position: absolute; top: 60px; left: 60px; right: 60px; bottom: 180px;
            display: flex; flex-direction: column; justify-content: center; z-index: 5; pointer-events: none;
        }
        .line { display: flex; flex-wrap: wrap; gap: 12px; width: 100%; }
        .word { display: inline-block; font-weight: 200; text-shadow: 0 0 30px rgba(255,255,255,0.4); }

        /* UI ELEMENTS */
        .input-hub {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; z-index: 1000; background: var(--panel); 
            border-radius: 12px; border: 1px solid var(--glass); backdrop-filter: blur(20px);
            transition: opacity 1s ease 0.5s; /* Fade in slightly later */
        }
        textarea { width: 100%; background: transparent; border: none; padding: 18px; color: white; text-align: center; outline: none; resize: none; font-size: 1rem; }

        .side-panel {
            position: fixed; top: 0; right: -350px; width: 300px; height: 100vh;
            background: var(--panel); border-left: 1px solid var(--glass);
            transition: right 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 2000; padding: 80px 20px 40px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto;
        }
        .side-panel.open { right: 0; }
        
        select { background: #1a1a1a !important; color: white !important; border: 1px solid var(--glass); padding: 12px; border-radius: 4px; width: 100%; }
        button { background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--glass); padding: 12px; border-radius: 4px; cursor: pointer; }

        #ui-toggle {
            position: fixed; top: 25px; right: 25px; z-index: 2001;
            background: rgba(0,0,0,0.6); border: 1px solid var(--neon); color: var(--neon);
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        #crop-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 6000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .crop-area { width: 90%; height: 80%; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="welcome-gate">
    <div class="welcome-slider">
        <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2000')"></div>
        <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2000')"></div>
    </div>
    <h1>STRING</h1>
    <p>A space for thoughts to take shape.</p>
    <button class="enter-btn" onclick="enterGallery()">INITIALIZE</button>
</div>

<div id="viewport" onclick="closeMenu()">
    <video id="bg-video" autoplay muted loop></video>
    <img id="bg-image" src="https://images.unsplash.com/photo-1534067783941-51c9c23ecefd?q=80&w=2000&auto=format&fit=crop">
    <div id="string-container"></div>
</div>

<div class="input-hub" style="opacity: 0;">
    <textarea id="cmd" placeholder="Begin writing..."></textarea>
</div>

<button id="ui-toggle" onclick="event.stopPropagation(); toggleMenu()">⚙</button>

<div class="side-panel" id="sidePanel" onclick="event.stopPropagation()">
    <div class="label" style="color:var(--neon); font-size:0.6rem; letter-spacing:2px; text-transform:uppercase;">Memory Archive</div>
    <div id="history-list"></div>

    <div class="label" style="color:var(--neon); font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; margin-top:15px;">Media Core</div>
    <button onclick="document.getElementById('media').click()">Upload Image</button>
    <button onclick="document.getElementById('video-up').click()" style="margin-top:5px">Upload Video</button>
    <input type="file" id="media" class="hidden" accept="image/*">
    <input type="file" id="video-up" class="hidden" accept="video/*">

    <div class="label" style="color:var(--neon); font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; margin-top:15px;">Neural Typography</div>
    <select id="fnt" onchange="apply()">
        <option value="'Space Mono'">Space Mono</option>
        <option value="'Playfair Display'">Playfair Editorial</option>
        <option value="'EB Garamond'">EB Garamond</option>
        <option value="'Inter'">Inter Light</option>
    </select>

    <div class="label" style="color:var(--neon); font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; margin-top:15px;">Alignment</div>
    <select id="aln" onchange="apply()">
        <option value="center">Center</option>
        <option value="flex-start">Left</option>
        <option value="flex-end">Right</option>
    </select>

    <div class="label" style="color:var(--neon); font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; margin-top:15px;">Atmosphere</div>
    <input type="color" id="clr" value="#ffffff" style="width:100%; height:40px; background:none; border:1px solid var(--glass); cursor:pointer;">
    <input type="range" id="sz" min="1" max="15" step="0.1" value="4" oninput="apply()">
    
    <button onclick="snapshot()" style="background: var(--neon); color: black; margin-top: 20px; font-weight: bold; width:100%;">EXPORT SYNC</button>
</div>

<div id="crop-modal">
    <div class="crop-area"><img id="crop-target"></div>
    <div style="margin-top: 20px; display: flex; gap: 15px;">
        <button onclick="commitCrop()" style="width: 150px; background: var(--neon); color: black;">Confirm</button>
        <button onclick="closeCrop()" style="width: 100px;">Abort</button>
    </div>
</div>

<script>
    let cropper;
    const cmd = document.getElementById('cmd');
    const container = document.getElementById('string-container');
    const sidePanel = document.getElementById('sidePanel');
    let words = [];

    // SLIDER
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');
    const slideInterval = setInterval(() => {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
    }, 6000);

    function enterGallery() { 
        clearInterval(slideInterval);
        
        // CINEMATIC DISSOLVE
        const gate = document.getElementById('welcome-gate');
        gate.classList.add('exit');
        
        // FADE IN MAIN UI
        document.querySelector('.input-hub').style.opacity = '1';
        
        setTimeout(() => { 
            gate.style.display = 'none'; 
        }, 1200); 
        
        loadHistory(); 
    }

    function toggleMenu() { sidePanel.classList.toggle('open'); }
    function closeMenu() { sidePanel.classList.remove('open'); }

    // VIDEO & IMAGE
    document.getElementById('video-up').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const url = URL.createObjectURL(file);
        const v = document.getElementById('bg-video');
        v.src = url; v.style.display = 'block'; v.play();
        document.getElementById('bg-image').style.opacity = '0';
    });

    document.getElementById('media').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            document.getElementById('crop-target').src = event.target.result;
            document.getElementById('crop-modal').style.display = 'flex';
            if(cropper) cropper.destroy();
            cropper = new Cropper(document.getElementById('crop-target'), { viewMode: 1, autoCropArea: 0.8 });
        };
        reader.readAsDataURL(file);
    });

    function commitCrop() { document.getElementById('bg-image').src = cropper.getCroppedCanvas().toDataURL(); document.getElementById('bg-image').style.opacity = '1'; document.getElementById('bg-video').style.display = 'none'; closeCrop(); }
    function closeCrop() { document.getElementById('crop-modal').style.display = 'none'; }

    // HISTORY
    function saveToHistory(text) {
        if (!text.trim()) return;
        let history = JSON.parse(localStorage.getItem('string_history') || '[]');
        if (history[0] === text) return;
        history.unshift(text);
        history = history.slice(0, 5);
        localStorage.setItem('string_history', JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('string_history') || '[]');
        document.getElementById('history-list').innerHTML = history.map(t => `<div class="history-item" style="font-size:0.7rem; padding:8px; cursor:pointer; background:rgba(255,255,255,0.05); margin-bottom:5px; border-radius:4px;" onclick="restoreText('${t.replace(/'/g, "\\'")}')">${t}</div>`).join('');
    }

    function restoreText(text) { cmd.value = text; cmd.dispatchEvent(new Event('input')); closeMenu(); }

    // RENDER
    cmd.addEventListener('input', (e) => {
        const text = e.target.value;
        container.innerHTML = ''; words = [];
        text.split('\n').forEach(line => {
            const div = document.createElement('div'); div.className = 'line'; container.appendChild(div);
            line.split(' ').forEach(w => {
                if(!w) return;
                const span = document.createElement('span'); span.className = 'word'; span.innerText = w;
                div.appendChild(span);
                words.push({ el: span, ph: Math.random() * Math.PI * 2 });
            });
        });
        apply();
        clearTimeout(window.saveTimer);
        window.saveTimer = setTimeout(() => saveToHistory(text), 2500);
    });

    function apply() {
        const f = document.getElementById('fnt').value, s = document.getElementById('sz').value, a = document.getElementById('aln').value, c = document.getElementById('clr').value;
        container.style.alignItems = a;
        Array.from(container.children).forEach(l => l.style.justifyContent = a);
        words.forEach(w => { w.el.style.fontFamily = f; w.el.style.fontSize = s + 'rem'; w.el.style.color = c; });
    }

    function tick() {
        const t = Date.now() * 0.002;
        words.forEach(w => { w.el.style.transform = `translateY(${Math.sin(t + w.ph) * 4}px)`; });
        requestAnimationFrame(tick);
    }
    tick();

    function snapshot() {
        sidePanel.classList.remove('open');
        document.querySelector('.input-hub').style.opacity = '0';
        document.getElementById('ui-toggle').style.opacity = '0';
        setTimeout(() => {
            html2canvas(document.body).then(canv => {
                const a = document.createElement('a'); a.download = 'art.png'; a.href = canv.toDataURL(); a.click();
                document.querySelector('.input-hub').style.opacity = '1';
                document.getElementById('ui-toggle').style.opacity = '1';
            });
        }, 500);
    }
</script>
</body>
</html>
